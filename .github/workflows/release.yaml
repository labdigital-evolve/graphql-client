name: release

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  validate:
    name: Validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    runs-on: "ubuntu-latest"
    env:
      CI: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install

      - name: Check formatting and typing
        run: bun run check

      - name: Run tests
        run: bun run test

      - name: Run build
        run: bun run build

  release:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install

      - name: Run build
        run: bun run build

      - name: Create and publish versions
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          title: "Release new version"
          commit: "release: update version"
          publish: bun run publish:ci
          version: bun run publish:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.LABDIGITAL_NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.LABDIGITAL_NPM_TOKEN }}
